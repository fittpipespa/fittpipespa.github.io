<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solución Rápida</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 400px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
      margin-bottom: 10px;
    }

    select, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      background: #28a745;
      color: white;
      cursor: pointer;
    }

    .resultado {
      margin-top: 20px;
      padding: 15px;
      background: #e9f7ef;
      border-radius: 10px;
      display: none;
    }

    img {
      width: 100%;
      border-radius: 10px;
      margin-top: 10px;
    }

    a {
      display: block;
      margin-top: 10px;
      padding: 10px;
      background: #25D366;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }

  </style>
</head>

<body>

<div class="container">

  <h2>¿Qué necesitas ahora?</h2>
  <p>Selecciona tu problema y te damos una solución inmediata 👇</p>

  <select id="problema">
    <option value="">-- Elegir opción --</option>
    <option value="hambre">Tengo hambre</option>
    <option value="dulce">Quiero algo dulce</option>
    <option value="ansiedad">Ansiedad / picoteo</option>
  </select>

  <button onclick="resolver()">Ver solución</button>

  <div id="resultado" class="resultado"></div>

</div>

<script>
function resolver() {
  let p = document.getElementById("problema").value;
  let html = "";

  if (p === "hambre") {
    html = `
      <h3>Mix de frutos secos</h3>
      <img src="https://via.placeholder.com/300">
      <p>Ideal para saciar el hambre rápido y de forma práctica.</p>
      <a href="https://wa.me/569XXXXXXXX?text=Quiero%20mix%20de%20frutos%20secos">
        Pedir por WhatsApp
      </a>
    `;
  }

  else if (p === "dulce") {
    html = `
      <h3>Guagüitas / Gomitas</h3>
      <img src="https://via.placeholder.com/300">
      <p>Perfecto para antojos dulces inmediatos.</p>
      <a href="https://wa.me/569XXXXXXXX?text=Quiero%20dulces">
        Pedir por WhatsApp
      </a>
    `;
  }

  else if (p === "ansiedad") {
    html = `
      <h3>Maní salado</h3>
      <img src="https://via.placeholder.com/300">
      <p>Ideal para picar y controlar la ansiedad.</p>
      <a href="https://wa.me/569XXXXXXXX?text=Quiero%20mani">
        Pedir por WhatsApp
      </a>
    `;
  }

  if (html === "") {
    html = "<p>Por favor selecciona una opción</p>";
  }

  let contenedor = document.getElementById("resultado");
  contenedor.style.display = "block";
  contenedor.innerHTML = html;
}
</script>

</body>
</html>
