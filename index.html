<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FittPippe</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <img class="logo" src="img/logopippe.png">
  <h1>FittPippe</h1>
  <p>Soluciones rápidas en fittings</p>
</header>

<!-- FILTRO -->
<div class="filtro">
  <h3>¿Qué problema tienes?</h3>
  <button onclick="filtrar('fuga')">Fuga</button>
  <button onclick="filtrar('conexion')">Conexión</button>
  <button onclick="filtrar('adaptar')">Adaptar</button>
  <button onclick="filtrar('corte')">Corte</button>
  <button onclick="filtrar('todos')">Ver todo</button>
</div>

<!-- PRODUCTOS -->
<div class="grid">

  <div class="producto fuga">
    <img src="img/codo.jpg">
    <h4>Codo PVC 90°</h4>
    <p>$1.200</p>
    <a href="https://wa.me/569XXXXXXXX?text=Necesito%20codo">Solicitar</a>
  </div>

  <div class="producto conexion">
    <img src="img/tee.jpg">
    <h4> Tee PVC presion CEM/CEM/HI 20X20x1/2</h4>
    <p>$2.150</p>
    <a href="https://wa.me/569XXXXXXXX?text=Necesito%20tee">Solicitar</a>
  </div>

  <div class="producto adaptar">
    <img src="img/reduccion.jpg">
    <h4>Reducción larga 50x20mm M/H</h4>
    <p>$450</p>
    <a href="https://wa.me/569XXXXXXXX?text=Necesito%20reduccion">Solicitar</a>
  </div>

  <div class="producto corte">
    <img src="img/valvula.jpg">
    <h4>Válvula de Bola 32mm PVC</h4>
    <p>$4.100</p>
    <a href="https://wa.me/569XXXXXXXX?text=Necesito%20valvula">Solicitar</a>
    
  </div>
  <div class="producto adaptar">
    <img src="copla.png">
    <h4>Copla Pvc</h4>
    <p>$1.410</p>
    <a href="https://wa.me/569XXXXXXXX?text=Necesito%20reduccion">Solicitar</a>

</div>

<script src="app.js"></script>

</body>
</html>
