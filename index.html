<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FittPippe</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <img class="logo" src="img/logopippe.png">
  <h1>FittPippe</h1>
  <p>Soluciones rápidas en fittings</p>
</header>

<!-- FILTRO -->
<div class="filtro">
  <h3>¿Qué problema tienes?</h3>
  <button class="filtro activo">Ver todo</button>
  <button class="filtro">Conexión</button>
  <button class="filtro">Adaptar</button>
  <button class="filtro">Corte</button>
  <button class="filtro">Fuga</button>
</div>

<!-- PRODUCTOS -->
<div class="grid">

  <div class="producto fuga">
    <img src="img/codo.png">
    <h4>Codo PVC 90°</h4>
    <p>$1.200</p>
  </div>

  <div class="producto conexion">
    <img src="img/tee.jpg">
    <h4> Tee PVC presion CEM/CEM/HI 20X20x1/2</h4>
    <p>$2.150</p>
   </div>

  <div class="producto adaptar">
    <img src="img/reduccion.jpg">
    <h4>Reducción larga 50x20mm M/H</h4>
    <p>$450</p>
  </div>

  <div class="producto corte">
    <img src="img/valvula.jpg">
    <h4>Válvula de Bola 32mm PVC</h4>
    <p class="precio">$4.100</p>
  </div>
  
  <div class="producto adaptar">
    <img src="img/copla.png">
    <h4>Copla Pvc</h4>
    <p>$1.410</p>
  </div>

<script src="app.js"></script>

</body>
</html>
